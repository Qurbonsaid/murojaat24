<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Termiz - Aqlli Shahar | Offline</title>
    <meta name="theme-color" content="#0b4f88" />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        height: 100%;
        background:
          radial-gradient(
            circle at top,
            rgba(12, 122, 90, 0.28),
            transparent 35%
          ),
          linear-gradient(180deg, #06111d 0%, #0b1c2d 48%, #02050a 100%);
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: #f8fbff;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .shell {
        width: min(100%, 560px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(18px);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
        padding: 32px;
        text-align: center;
      }

      .logo {
        width: 96px;
        height: 96px;
        display: block;
        margin: 0 auto 20px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.05;
      }

      p {
        margin: 16px 0 0;
        color: rgba(248, 251, 255, 0.82);
        font-size: 1rem;
        line-height: 1.6;
      }

      .status {
        margin-top: 22px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #dce7f2;
        font-size: 0.95rem;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #5ec8ff;
        box-shadow: 0 0 0 0 rgba(94, 200, 255, 0.6);
        animation: pulse 1.6s infinite;
      }

      .actions {
        margin-top: 28px;
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      button,
      a {
        appearance: none;
        border: 0;
        border-radius: 16px;
        padding: 14px 18px;
        font-size: 0.98rem;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      .primary {
        background: linear-gradient(135deg, #5ec8ff, #0c7a5a);
        color: #041018;
      }

      .secondary {
        background: rgba(255, 255, 255, 0.08);
        color: #f8fbff;
        border: 1px solid rgba(255, 255, 255, 0.14);
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(94, 200, 255, 0.6);
        }
        70% {
          box-shadow: 0 0 0 16px rgba(94, 200, 255, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(94, 200, 255, 0);
        }
      }

      @media (max-width: 480px) {
        .shell {
          padding: 24px;
          border-radius: 22px;
        }

        .actions {
          flex-direction: column;
        }

        button,
        a {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <img
        class="logo"
        src="/termiz-aqlli-shahar-logo.svg"
        alt="Termiz - Aqlli Shahar"
      />
      <h1>Internet yo'q</h1>
      <p>
        Siz hozir oflayn rejimsiz. PWA ilovasi internet qayta tiklanganda
        yangilanadi va xizmatlardan foydalanish davom etadi.
      </p>
      <div class="status"><span class="dot"></span> Oflayn rejim aktiv</div>
      <div class="actions">
        <button
          class="primary"
          type="button"
          onclick="window.location.reload()"
        >
          Qayta urinish
        </button>
        <a class="secondary" href="/login">Kirish sahifasi</a>
      </div>
    </main>
    <script>
      window.addEventListener("online", () => window.location.reload());
    </script>
  </body>
</html>
